  "从上传的财报 PDF 中提取资产负债表并列出主要科目的金额。",
  "对利润表进行同比分析，指出收入、成本、净利润的变化原因。",
  "请生成营收及净利润的同比（YoY）和环比（QoQ）数据表，并绘制趋势图（单位：万元）。"
